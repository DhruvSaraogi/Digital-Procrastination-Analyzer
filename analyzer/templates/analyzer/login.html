{% extends 'analyzer/base.html' %}
{% block title %}Login — ProcrastiTrack{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-logo">
        <i class="bi bi-braces-asterisk" style="background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
    </div>
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Sign in to continue tracking your productivity</p>

    <form method="POST" id="login-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control bg-dark text-light border-secondary" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control bg-dark text-light border-secondary" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="login-submit">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
</div>
{% endblock %}
